services:
  - type: web
    name: frontend-hirex
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://backend-7aoi.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
